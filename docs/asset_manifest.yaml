  - id: cursor_main
    file: cursor_main.png
    category: cursor
    role: bespoke in-game cursor
    scene_rect:
      width: 32
      height: 32
    hotspot:
      x: 2
      y: 2
    alpha: true
    scaling: nearest
    z_layer: cursor
    interactive: false
    notes:
      - custom cursor replaces default browser cursor
      - should be authored at source-resolution style, then scaled cleanly
      - yes: nearest-neighbor / no antialiasing applies here too
      - hotspot must be explicitly defined

  - id: hover_outline_square
    file: null
    category: generated_overlay
    role: pixel-perfect hover outline for rectangular interactive elements
    generated_in_code: true
    color: yellow
    stroke_width_scene_px: 2
    z_layer: hover_outline_overlay
    interactive: false
    notes:
      - drawn in scene coordinates before scaling
      - no antialiasing
      - used for slider handles and any rectangular controls

  - id: hover_outline_circle
    file: null
    category: generated_overlay
    role: pixel-perfect hover outline for circular interactive elements
    generated_in_code: true
    color: yellow
    stroke_width_scene_px: 2
    z_layer: hover_outline_overlay
    interactive: false
    notes:
      - drawn in scene coordinates before scaling
      - no antialiasing
      - used for knob hover states
      - remains unrotated even while underlying knob sprite rotates

dynamic_regions:
  - id: ffmpeg_viewport
    role: live FFmpeg render region
    scene_rect:
      x: 237
      y: 90
      width: 250
      height: 250
    z_layer: ffmpeg_render
    notes:
      - rectangular render region
      - shown through transparent aperture in background plate
      - pixelated scaling only
      - no drop shadow

  - id: ghost_overlay
    role: puzzle hint / ghost silhouettes
    scene_rect:
      x: 237
      y: 90
      width: 250
      height: 250
    z_layer: ghost_overlay
    notes:
      - sits above FFmpeg render
      - sits below CRT glass overlay
      - belongs visually to the screen content, not the surrounding UI

  - id: frame_count
    role: live count of frames rendered
    scene_rect:
      x: 504
      y: 13
      width: 42
      height: 18
    z_layer: led_state_overlay
    notes:
      - in-fiction 7-segment display