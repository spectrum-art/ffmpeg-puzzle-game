project:
  name: ffmpeg_puzzle_mvp_ui
  scene_base_resolution:
    width: 640
    height: 480
  scaling_rules:
    scene_scales_uniformly: true
    preserve_aspect_ratio: true
    nearest_neighbor_scaling: true
    no_antialiasing: true
    integer_scene_coordinates_only: true
    hitboxes_scale_with_scene: true

render_stack:
  # back to front
  - ffmpeg_render
  - ghost_overlay
  - crt_glass_overlay
  - background_plate
  - interactive_controls
  - led_state_overlay
  - hover_outline_overlay
  - cursor

interaction_rules:
  topmost_interactive_element_wins: true
  cursor_changes_on_hover: false
  custom_cursor_enabled: true
  knob_interaction:
    method: vertical_drag
    mouse_wheel_enabled: false
    circular_drag_enabled: false
    continue_drag_outside_hitbox: true
  slider_interaction:
    method: horizontal_drag
    continue_drag_outside_hitbox: true

quantization:
  phase_1_knobs:
    detent_degrees: 30
  phase_3_knobs:
    detent_degrees: 45
    dead_zone:
      location: bottom
      size_degrees: 45
    discrete_positions_per_channel: 6
  sliders:
    quantized: true
    values_defined_per_control: true

assets:
  - id: bg_console
    file: bg_console_640x480.png
    category: static_background
    role: full-screen machine background plate with bezel and transparent CRT aperture
    scene_rect:
      x: 0
      y: 0
      width: 640
      height: 480
    alpha: true
    scaling: nearest
    z_layer: background_plate
    interactive: false
    notes:
      - contains all 100% opaque machine art
      - contains transparent aperture for FFmpeg render to show through
      - contains baked inner shadow around CRT opening
      - frame counter housing is baked into this asset
      - off-state machine art may be included where appropriate unless explicitly stateful elsewhere

  - id: crt_glass_overlay
    file: crt_glass_overlay.png
    category: overlay
    role: subtle CRT glass/reflection layer over FFmpeg render
    scene_rect:
      x: 232
      y: 85
      width: 260
      height: 260
    alpha: true
    scaling: nearest
    z_layer: crt_glass_overlay
    interactive: false
    notes:
      - sits above FFmpeg render and ghost overlay
      - sits below background plate
      - no scanlines for MVP
      - subtle only; may include reflection, mild edge darkening, slight glass feel

  - id: knob_1_phase_1
    file: knob_phase_1.png
    category: interactive_sprite
    role: rotary knob sprite for phase 1 controls
    scene_rect:
      x: 110
      y: 74
      width: 31
      height: 31
    center_point:
      x: 125.5
      y: 89.5
    hit_radius: 15
    alpha: true
    scaling: nearest
    z_layer: interactive_controls
    interactive: true
    interaction_type: knob
    state_mapping:
      value_source: existing_phase_1_knob_logic
      visual_rotation_quantized: true
      detent_degrees: 30
    notes:
      - square 1:1 sprite
      - rotates around exact center
      - transparent padding allowed / encouraged to avoid clipping
      - pointer / indicator baked into sprite

  - id: knob_2_phase_1
    file: knob_phase_1.png
    scene_rect:
      x: 110
      y: 116
    center_point:
      x: 125.5
      y: 131.5

  - id: knob_3_phase_1
    file: knob_phase_1.png
    scene_rect:
      x: 110
      y: 159
    center_point:
      x: 125.5
      y: 174.5

  - id: knob_1_phase_3
    file: knob_phase_3.png
    category: interactive_sprite
    role: rotary knob sprite for Red value color control
    scene_rect:
      x: 406
      y: 413
      width: 27
      height: 27
    center_point:
      x: 419.5
      y: 426.5
    hit_radius: 13
    alpha: true
    scaling: nearest
    z_layer: interactive_controls
    interactive: true
    interaction_type: knob
    state_mapping:
      value_source: existing_phase_3_knob_logic
      visual_rotation_quantized: true
      detent_degrees: 45
      dead_zone:
        location: bottom
        size_degrees: 45
      discrete_positions: 6
    notes:
      - square 1:1 sprite
      - rotates around exact center
      - transparent padding allowed / encouraged
      - bottom dead zone means one 45-degree segment has no valid color position

  - id: knob_2_phase_3
    file: knob_phase_3.png
